# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - justudy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install, scan, lint, build, and test
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run lint
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules
          if-no-files-found: warn

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8B3410335EE74EBDA0840F5C0B2185D1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4F7D255E23774724A958C940B280A87D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0BB752E4EC34430CB6935B6A2BBB7DB2 }}

      - name: Configure Azure runtime
        uses: azure/appservice-settings@v1
        with:
          app-name: 'justudy'
          slot-name: 'Production'
          app-settings-json: |
            [
              { "name": "WEBSITE_NODE_DEFAULT_VERSION", "value": "~22", "slotSetting": false },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false },
              { "name": "ENABLE_ORYX_BUILD", "value": "true", "slotSetting": false }
            ]

      - name: Configure Azure startup command
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='justudy'].resourceGroup | [0]" -o tsv)
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Could not find resource group for Azure Web App 'justudy'."
            exit 1
          fi
          az webapp config set \
            --resource-group "$RESOURCE_GROUP" \
            --name "justudy" \
            --startup-file "npm start"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'justudy'
          slot-name: 'Production'
          package: .
