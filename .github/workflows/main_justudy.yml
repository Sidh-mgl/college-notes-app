name: Build and deploy Node.js app to Azure Web App - justudy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: justudy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build standalone app
        run: npm run build

      - name: Package Azure standalone app
        run: npm run azure:package

      - name: Smoke test standalone app
        run: npm run azure:smoke

      - name: Test
        run: npm run test --if-present

      - name: Dependency audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: azure-package
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v7
        with:
          name: node-app
          path: azure-package

      - name: Verify deployment package
        run: |
          test -f azure-package/server.js
          test -f azure-package/web.config
          test -d azure-package/.next
          test -d azure-package/public
          test ! -f azure-package/.env
          test ! -f azure-package/.env.local

      - name: Check Azure publish profile secret
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "::error title=Missing Azure publish profile::Add a GitHub repository secret named AZURE_WEBAPP_PUBLISH_PROFILE. Download it from Azure App Service 'justudy' -> Get publish profile. The old Azure client/tenant/subscription login is failing with 'No subscriptions found'."
            exit 1
          fi

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: azure-package
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
